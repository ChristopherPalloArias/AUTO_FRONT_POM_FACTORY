webdriver {
  driver = chrome
  autodownload = true
  base.url = "http://localhost:3000"
  capabilities {
    browserName = "chrome"
    "goog:chromeOptions" {
      args = ["--start-maximized", "--ignore-certificate-errors", "test-type", "no-sandbox"]
    }
  }
}
headless.mode = false
serenity {
  take.screenshots = FOR_EACH_ACTION
  type.delay = 150
}
